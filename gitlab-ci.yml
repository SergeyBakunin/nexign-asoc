spec:
  inputs:
    app_version:
      description: "Версия приложения (по умолчанию - SHA коммита)"
      default: ""
    run_build:
      description: "Запускать сборку и тесты?"
      type: boolean
      default: true
    run_docker_build:
      description: "Запускать Docker сборку образов?"
      type: boolean
      default: true
    run_codescoring_file:
      description: "Запускать CodeScoring SCA (file)?"
      type: boolean
      default: true
    run_codescoring_image:
      description: "Запускать CodeScoring SCA (image)?"
      type: boolean
      default: true
    run_trivy:
      description: "Запускать Trivy сканирование образов?"
      type: boolean
      default: true
    run_ptai:
      description: "Запускать PT AI SAST?"
      type: boolean
      default: true
    run_gitleaks:
      description: "Запускать Gitleaks поиск секретов?"
      type: boolean
      default: true
    run_zap:
      description: "Запускать ZAP DAST сканирование?"
      type: boolean
      default: true
    run_tron:
      description: "Отправлять результаты в TRON ASOC?"
      type: boolean
      default: true
    trivy_severity:
      description: "Уровень критичности для Trivy"
      default: "CRITICAL,HIGH"
      options:
        - "CRITICAL"
        - "CRITICAL,HIGH"
        - "CRITICAL,HIGH,MEDIUM"
    codescoring_env:
      description: "Контур CodeScoring"
      default: "prod"
      options:
        - "prod"
        - "test"
        - "both"
    zap_scan_type:
      description: "Тип ZAP сканирования"
      default: "baseline"
      options:
        - "baseline"
        - "full"
        - "api"
---
stages:
  - build
  - docker-build
  - test
  - sca-file
  - sca-image
  - trivy
  - ptai
  - gitleaks
  - zap
  - report

# ─── ПЕРЕМЕННЫЕ ────────────────────────────────────────────────────────────────
variables:
  IMAGE_BACKEND: dso-tools-backend:$CI_COMMIT_SHORT_SHA
  IMAGE_FRONTEND: dso-tools-frontend:$CI_COMMIT_SHORT_SHA
  CODESCORING_URL: "https://codescoring.nexign.com"
  CODESCORING_TEST_URL: "https://codescoring.kolla.paas.nexign.com"
  ARTIFACTORY_URL: "https://artifactory.nexign.com:443/artifactory/generic-ssdlc"
  APP_VERSION: $[[ inputs.app_version | expand_vars ]]

# ─── BUILD ─────────────────────────────────────────────────────────────────────
backend:build:
  stage: build
  image: python:3.11
  tags: [vex-tool]
  rules:
    - if: '"$[[ inputs.run_build ]]" == "true"'
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths: [.pip_cache/]
  script:
    - cd backend
    - pip install --cache-dir ../.pip_cache -r requirements.txt
      --index-url https://artifactory.nexign.com:443/artifactory/api/pypi/pypi-mirror-virtual/simple
      --trusted-host artifactory.nexign.com

frontend:build:
  stage: build
  image: node:20
  tags: [vex-tool]
  rules:
    - if: '"$[[ inputs.run_build ]]" == "true"'
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths: [frontend/node_modules/]
  script:
    - cd frontend
    - npm install

# ─── DOCKER BUILD ──────────────────────────────────────────────────────────────
docker:build-backend:
  stage: docker-build
  image: docker:24
  tags: [vex-tool]
  rules:
    - if: '"$[[ inputs.run_docker_build ]]" == "true"'
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -f backend/Dockerfile -t $IMAGE_BACKEND ./backend
    - docker save $IMAGE_BACKEND -o backend-image.tar
  artifacts:
    paths: [backend-image.tar]
    expire_in: 1 hour

docker:build-frontend:
  stage: docker-build
  image: docker:24
  tags: [vex-tool]
  rules:
    - if: '"$[[ inputs.run_docker_build ]]" == "true"'
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -f frontend/Dockerfile -t $IMAGE_FRONTEND ./frontend
    - docker save $IMAGE_FRONTEND -o frontend-image.tar
  artifacts:
    paths: [frontend-image.tar]
    expire_in: 1 hour

# ─── TEST ──────────────────────────────────────────────────────────────────────
backend:test:
  stage: test
  image: python:3.11
  tags: [vex-tool]
  rules:
    - if: '"$[[ inputs.run_build ]]" == "true"'
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths: [.pip_cache/]
  script:
    - cd backend
    - pip install --cache-dir ../.pip_cache -r requirements.txt
      --index-url https://artifactory.nexign.com:443/artifactory/api/pypi/pypi-mirror-virtual/simple
      --trusted-host artifactory.nexign.com
    - python -m pytest tests/ -v || echo "No tests found, skipping"

# ─── SCA FILE ──────────────────────────────────────────────────────────────────
# Единая схема для всех codescoring job'ов:
# johnny --save-results создаёт bom.json (CycloneDX) с ЗАВИСИМОСТЯМИ и УЯЗВИМОСТЯМИ.
# Переименовываем файл и отправляем его в TRON на оба эндпоинта:
#   /check/{id}/external -> уязвимости (раздел "Проблемы")
#   /layer/{id}/sbom     -> зависимости (раздел "Зависимости")
.johnny_setup: &johnny_setup
  - apt-get update -qq && apt-get install -y -qq curl
  - curl -sL "$ARTIFACTORY_URL/codescoring/johnny.0" -o /usr/local/bin/johnny
  - chmod +x /usr/local/bin/johnny

codescoring:backend-file:
  stage: sca-file
  image: ubuntu:22.04
  tags: [vex-tool]
  rules:
    - if: '"$[[ inputs.run_codescoring_file ]]" == "true" && ("$[[ inputs.codescoring_env ]]" == "prod" || "$[[ inputs.codescoring_env ]]" == "both")'
  before_script:
    - *johnny_setup
  script:
    - cd $CI_PROJECT_DIR
    - johnny scan file --api_url $CODESCORING_URL --api_token $CODESCORING_TOKEN --project "DSO_tools@backend@file" --save-results --create-project ./backend
    - mv bom.json codescoring-backend-file-bom.json
  artifacts:
    paths:
      - codescoring-backend-file-bom.json
    when: always
    expire_in: 1 week
  allow_failure: true

codescoring:frontend-file:
  stage: sca-file
  image: ubuntu:22.04
  tags: [vex-tool]
  rules:
    - if: '"$[[ inputs.run_codescoring_file ]]" == "true" && ("$[[ inputs.codescoring_env ]]" == "prod" || "$[[ inputs.codescoring_env ]]" == "both")'
  before_script:
    - *johnny_setup
  script:
    - cd $CI_PROJECT_DIR
    - johnny scan file --api_url $CODESCORING_URL --api_token $CODESCORING_TOKEN --project "DSO_tools@frontend@file" --save-results --create-project ./frontend
    - mv bom.json codescoring-frontend-file-bom.json
  artifacts:
    paths:
      - codescoring-frontend-file-bom.json
    when: always
    expire_in: 1 week
  allow_failure: true

codescoring:backend-file-test:
  stage: sca-file
  image: ubuntu:22.04
  tags: [vex-tool]
  rules:
    - if: '"$[[ inputs.run_codescoring_file ]]" == "true" && ("$[[ inputs.codescoring_env ]]" == "test" || "$[[ inputs.codescoring_env ]]" == "both")'
  before_script:
    - *johnny_setup
  script:
    - cd $CI_PROJECT_DIR
    - johnny scan file --api_url $CODESCORING_TEST_URL --api_token $CODESCORING_TEST_TOKEN --project "DSO_tools@backend@file" --save-results --create-project ./backend
  allow_failure: true

codescoring:frontend-file-test:
  stage: sca-file
  image: ubuntu:22.04
  tags: [vex-tool]
  rules:
    - if: '"$[[ inputs.run_codescoring_file ]]" == "true" && ("$[[ inputs.codescoring_env ]]" == "test" || "$[[ inputs.codescoring_env ]]" == "both")'
  before_script:
    - *johnny_setup
  script:
    - cd $CI_PROJECT_DIR
    - johnny scan file --api_url $CODESCORING_TEST_URL --api_token $CODESCORING_TEST_TOKEN --project "DSO_tools@frontend@file" --save-results --create-project ./frontend
  allow_failure: true

# ─── SCA IMAGE ─────────────────────────────────────────────────────────────────
codescoring:backend-image:
