services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: asoc
      POSTGRES_USER: asoc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asoc}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asoc -d asoc"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: sergeybakunin/nexign-asoc-backend:${VERSION:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://asoc:${POSTGRES_PASSWORD:-asoc}@db:5432/asoc
      API_TOKEN: ${API_TOKEN:-changeme}
    ports:
      - "${BACKEND_PORT:-8001}:8000"

  frontend:
    image: sergeybakunin/nexign-asoc-frontend:${VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3001}:80"

volumes:
  pgdata:
